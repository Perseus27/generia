name: Nymph Bard 25
id: nymph-bard-25
info:
  species: Fey
  level: 25
  size: Medium
  tags: [[Flying, 10], Freecaster, Sapient]
notes: >
  An unpredictable nature spirit. Ruthless and dangerous.
  [br]This particular nymph may cast any Bard spells of Tier III and lower.

attributes:
  CON: [9, 4]
  STR: [4, 2]
  DEX: [10, 5]
  INT: [7, 3]
  WIL: [13, 6]
  PER: [6, 3]
values:
  EN: 10
  MP: 20
  MPR: 5
  WL: 6
  WT: 8
  TN: 3
  MS: 6
armor:
  head: 3
  torso: 5
  arms: 4
  legs: 4
  md: 6
  er: 4
loot:
  - "Nymph Stiletto (Random Tier I Enchantment)"
  - Monster Core, normal
actions:
  active:
    - name: Hidden Dagger
      type: Melee Attack
      auto: Stiletto
    - name: Bard Spell SA
      type: SA
      auto: [SA, WIL]
      prof: Bard
    - name: Bard Spell DC
      type: DC
      auto: [DC, WIL]
      prof: Bard
    - name: Fog and Smoke
      type: Reaction
      effect: >
        The nymph becomes mist-like for the rest of this turn, gaining [url:status#Resistant]Resistant[/url] [i]Physical[/i].
        [br][i]Only once per Phase.[/i]
      cost: ""
  passive:
    - name: Perks
      type: Passive
      perks: [Showtime, Mostly Harmless, Astral Body I, Battle Meditation, Focus II]
    - name: Proficiencies
      type: Passive
      effect:
        - [Bard, 5, WIL]
        - [Dagger, 3]
    - name: Fey Soul
      type: Passive
      effect:
        - MD is increased by [section:clr-attr]WIL-MOD[/section].
