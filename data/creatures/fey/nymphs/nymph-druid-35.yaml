name: Nymph Druid 35
id: nymph-druid-35
info:
  species: Fey
  level: 35
  size: Medium
  tags: [[Flying, 10], Freecaster, Sapient]
notes: >
  An unpredictable nature spirit. Ruthless and dangerous.
  [br]This particular nymph may cast any Druid spells (Flora) of Tier III and lower.

attributes:
  CON: [11, 5]
  STR: [4, 2]
  DEX: [11, 5]
  INT: [8, 4]
  WIL: [16, 8]
  PER: [8, 4]
values:
  EN: 10
  MP: 20
  MPR: 6
  WL: 6
  WT: 9
  TN: 4
  MS: 8
armor:
  head: 4
  torso: 6
  arms: 5
  legs: 5
  md: 8
  er: 4
loot:
  - "Nymph Shillelagh (Focus Druid, Random Tier I Enchantment)"
  - Monster Core, normal
actions:
  active:
    - name: Shillelagh
      type: Melee Attack
      auto: Shillelagh
    - name: Druid Spell PA/SA
      type: PA/SA
      auto: [PA, WIL]
      prof: Druid
    - name: Druid Spell DC
      type: DC
      auto: [DC, WIL]
      prof: Druid
    - name: Fog and Smoke
      type: Reaction
      effect: >
        The nymph becomes mist-like for the rest of this turn, gaining [url:status#Resistant]Resistant[/url] [i]Physical[/i].
        [br][i]Only once per Phase.[/i]
      cost: ""
  passive:
    - name: Perks
      type: Passive
      perks: [Rot and Renewal, "Wildgrowth: Permanence", Astral Body I, Battle Meditation, Focus II]
    - name: Proficiencies
      type: Passive
      effect:
        - [Druid, 6, WIL]
        - [Staff, 4]
    - name: Fey Soul
      type: Passive
      effect:
        - MD is increased by [section:clr-attr]WIL-MOD[/section].
