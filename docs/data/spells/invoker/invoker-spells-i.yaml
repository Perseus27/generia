name: Invoker Spells I
id: invoker-spells-i
id_appendix: I
prefix: invokerS

offensive:
  - name: Divine Blast I
    id: divine-blast-i
    auto_type: [SA, WIL]
    tags: [TIER I, Faith, Offensive, "Range: 20m"]
    type:
      - "[section:clr-sa]SA[/section] [section:clr-attr]WIL[/section] vs [section:clr-attr]???[/section]"
    cost:
      - "[section:clr-mp]2 MP[/section]"
    description: >
      A ranged spell attack based on the patron deity's powers.
    effect: >
      [section:clr-roll]2d6[/section] [section:clr-emph]Element[/section]
    saved: Damage halved.
    saved10: No effect.

  - name: Divine Bolt I
    id: divine-bolt-i
    auto_type: [PA, WIL]
    tags: [TIER I, Faith, Offensive, "Range: 20m"]
    type:
      - "[section:clr-pa]PA[/section] [section:clr-attr]WIL[/section]"
    cost:
      - "[section:clr-mp]2 MP[/section]"
    description: >
      A ranged projectile attack based on the patron deity's powers.
    effect: >
      [section:clr-roll]2d8[/section] [section:clr-emph]Element[/section]

  - name: Divine Strike I
    id: divine-strike-i
    tags: [TIER I, Offensive, "Range: Weapon"]
    type:
      - "[section:clr-attack]BASIC ATTACK[/section]"
    cost:
      - "[section:clr-mp]1 MP[/section]"
    description: >
      Execute a [url:def#BasicAttack]basic attack[/url] with an equipped weapon. The damage type of this attack is changed to one of the patron deity's elements.
    effect: >
      Damage type becomes [section:clr-emph]Element[/section].


defensive:
  - name: Divine Barrier I
    id: divine-barrier-i
    tags: [TIER I, Faith, Reaction, "[section:clr-support]SUPPORT[/section]", "Range: 20m"]
    auto_type: [SD, WIL, PER]
    type:
      - "[section:clr-sd]SD[/section] [section:clr-attr]WIL[/section]+[section:clr-attr]PER[/section]"
    cost:
      - "[section:clr-mp]1 MP[/section]"
    description: >
      Reduces incoming damage in a way appropriate for the patron deity's powers.
      [br]Lasts for the rest of the turn or until destroyed. Excess damage carries over.
    effect: >
      [section:clr-roll]1d4[/section] + [[section:clr-value]Potency[/section]] Protection

  - name: Divine Protection I
    id: divine-protection-i
    tags: [TIER I, Faith, Defensive, "[section:clr-support]SUPPORT[/section]", "[section:clr-conc]CONCENTRATION[/section]", "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]1 MP[/section]"
    description: >
      Grants a magical shield in a way appropriate for the patron deity's powers.
    effect: >
      [section:clr-roll]1d6[/section] + [[section:clr-value]Potency[/section]] Protection


utility:
  - name: Divine Bane
    id: divine-bane
    tags: [TIER I, Faith, Utility, "[section:clr-affliction]AFFLICTION[/section]", "[section:clr-control]CONTROL[/section]", "([section:clr-conc]CONCENTRATION[/section])", "Range: 20m"]
    auto_type: [DC, WIL]
    type:
      - "[section:clr-DC]DC[/section] [section:clr-attr]WIL[/section] vs [section:clr-attr]???[/section]"
    cost:
      - "[section:clr-mp]1–2 MP[/section]"
    description: >
      Afflicts a target within range with a negative [url:status]status effect[/url] based on the patron deity's powers.
      [br]May or may not be cast with Concentration, depending on the effect and common sense.
      [br]Mana cost depends on the strength of the effect, again based on common sense.
    effect: >
      Applies a negative [url:status]status effect[/url].

  - name: Divine Boon
    id: divine-boon
    tags: [TIER I, Faith, Utility, "[section:clr-support]SUPPORT[/section]", "([section:clr-conc]CONCENTRATION[/section])", "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]1–2 MP[/section]"
    description: >
      Grants a target within range a positive [url:status]status effect[/url] based on the patron deity's powers.
      [br]May or may not be cast with Concentration, depending on the effect and common sense.
      [br]Mana cost depends on the strength of the effect, again based on common sense.
      [br][i]If the target is unwilling, cast as [section:clr-dc]DC[/section] instead (see [url:invokerS#divine-bane]Divine Bane[/url]).[/i]
    effect: >
      Applies a positive [url:status]status effect[/url].

  - name: Divine Sense
    id: divine-sense
    tags: [TIER I, Faith, Utility, "Radius: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]1 MP[/section]"
    description: >
      Senses the presence of creatures, objects, magic, terrain, or phenomena related to the patron deity's domain.
      [br]The spell does not provide exact knowledge, only a general impression of presence, direction, or intensity.
    effect: >
      Reveals nearby domain-related presences.

  - name: Guidance
    id: guidance
    tags: [TIER I, Faith, Utility, "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]1 MP[/section]"
    description: >
      Grants a target within range the patron deity's guidance to improve the result of their next domain-related [section:clr-roll]roll[/section] within this Phase.
    effect: >
      [section:clr-roll]Roll[/section] is eased by [[section:clr-value]Potency[/section]].

  - name: Imbuement I
    id: imbuement-i
    tags: [TIER I, Faith, Utility, "[section:clr-support]SUPPORT[/section]", "[section:clr-conc]CONCENTRATION[/section]", "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]1 MP[/section]"
    description: >
      Imbues a target within range with divine energies, temporarily raising an [section:clr-attr]attribute MOD[/section] relating to the patron deity's powers.
    effect: >
      [section:clr-attr]Attribute MOD[/section] is increased by [section:clr-value]1[/section].

  - name: Purification
    id: purification
    auto_type: [DC+, WIL]
    tags: [TIER I, Faith, Utility, "[section:clr-support]SUPPORT[/section]", "[section:clr-control]CONTROL[/section]", "Range: 20m"]
    type:
      - "[section:clr-dc]DC+[/section] [section:clr-attr]WIL[/section] vs [section:clr-dc]DC[/section]"
    cost:
      - "[section:clr-mp]1 MP[/section]"
    description: >
      Attempts to [url:status#Removal]cleanse[/url] a specified status effect from a target in range.
      [br][i]Only works if the patron deity's powers could reasonably produce cleansing effects.[/i]
    effect: >
      Specified status effect is removed.

  - name: Restoration I
    id: restoration-i
    tags: [TIER I, Faith, Utility, "[section:clr-heal]HEAL[/section]", "Range: 16m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]2 MP[/section]"
    description: >
      Heals a target within range.
      [br][i]Only works if the patron deity's powers could reasonably produce restorative effects.[/i]
    effect: >
      [section:clr-roll]2d6[/section] [section:clr-heal]Healing[/section].


ritual:
  - name: Mark of Faith
    id: mark-of-faith
    tags: [TIER I, Out of Combat]
    type:
      - "[section:clr-ritual]RITUAL[/section]"
    cast_time: 1 Minute
    description: >
      Marks a willing creature or object with a holy mark, granting it an effect based on the patron deity's powers.
    effect: >
      Effect, duration, and costs are negotiable.

  - name: Prayer
    id: prayer
    tags: [TIER I, Out of Combat]
    type:
      - "[section:clr-ritual]RITUAL[/section]"
    cast_time: Variable
    description: >
      Produce an effect based on the patron deity's powers.
    effect: >
      Effect, duration, and any costs are negotiable.
      [br]Enables [i][url:/generia/rules/magic/freecasting]Freecasting[/url][/i].
