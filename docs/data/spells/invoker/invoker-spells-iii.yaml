name: Invoker Spells III
id: invoker-spells-iii
id_appendix: III
prefix: invokerS

offensive:
  - name: Divine Blast III
    id: divine-blast-iii
    auto_type: [SA, WIL]
    tags: [TIER III, Faith, Offensive, "Range: 20m"]
    type:
      - "[section:clr-sa]SA[/section] [section:clr-attr]WIL[/section] vs [section:clr-attr]???[/section]"
    cost:
      - "[section:clr-mp]4 MP[/section]"
    description: >
      A ranged spell attack based on the patron deity's powers.
    effect: >
      [section:clr-roll]4d6[/section] [section:clr-emph]Element[/section]
    saved: Damage halved.
    saved10: No effect.

  - name: Divine Bolt III
    id: divine-bolt-iii
    auto_type: [PA, WIL]
    tags: [TIER III, Faith, Offensive, "Range: 20m"]
    type:
      - "[section:clr-pa]PA[/section] [section:clr-attr]WIL[/section]"
    cost:
      - "[section:clr-mp]4 MP[/section]"
    description: >
      A ranged projectile attack based on the patron deity's powers.
    effect: >
      [section:clr-roll]4d8[/section] [section:clr-emph]Element[/section]

  - name: Divine Burst II
    id: divine-burst-ii
    auto_type: [SA, WIL]
    tags: [TIER III, Faith, Offensive, "Range: 20m", "Radius: 2m"]
    type:
      - "[section:clr-sa]SA[/section] [section:clr-attr]WIL[/section] vs [section:clr-attr]???[/section]"
    cost:
      - "[section:clr-mp]5 MP[/section]"
    description: >
      A ranged area-of-effect spell attack based on the patron deity's powers.
    effect: >
      [section:clr-roll]3d6[/section] [section:clr-emph]Element[/section]
    saved: Damage halved.
    saved10: No effect.

  - name: Divine Strike III
    id: divine-strike-iii
    tags: [TIER III, Free Action, "Range: Weapon"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]2 MP[/section]"
    description: >
      The damage type of all following [url:def#BasicAttack]basic attacks[/url] within this turn is changed to one of the patron deity's elements.
    effect: >
      Damage type becomes [section:clr-emph]Element[/section].


defensive:
  - name: Divine Barrier III
    id: divine-barrier-iii
    tags: [TIER III, Faith, Reaction, "[section:clr-support]SUPPORT[/section]", "Range: 20m"]
    auto_type: [SD, WIL, PER]
    type:
      - "[section:clr-sd]SD[/section] [section:clr-attr]WIL[/section]+[section:clr-attr]PER[/section]"
    cost:
      - "[section:clr-mp]3 MP[/section]"
    description: >
      Reduces incoming damage in a way appropriate for the patron deity's powers.
      [br]Lasts for the rest of the turn or until destroyed. Excess damage carries over.
    effect: >
      [section:clr-roll]3d4[/section] + [[section:clr-value]Potency[/section]] Protection

  - name: Divine Protection III
    id: divine-protection-iii
    tags: [TIER III, Faith, Defensive, "[section:clr-support]SUPPORT[/section]", "[section:clr-conc]CONCENTRATION[/section]", "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]3 MP[/section]"
    description: >
      Grants a magical shield in a way appropriate for the patron deity's powers.
    effect: >
      [section:clr-roll]3d6[/section] + [[section:clr-value]Potency[/section]] Protection

  - name: Mass Protection II
    id: mass-protection-ii
    tags: [TIER III, Faith, Defensive, "[section:clr-support]SUPPORT[/section]", "[section:clr-conc]CONCENTRATION[/section]", "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]2 MP[/section] per target"
    description: >
      Grants up to [[section:clr-value]Faith[/section]] targets in range a magical shield in a way appropriate for the patron deity's powers.
    effect: >
      [section:clr-roll]2d6[/section] + [[section:clr-value]Potency[/section]] Protection


utility:
  - name: Bane Aura II
    id: bane-aura-ii
    tags: [TIER III, Faith, Utility, "[section:clr-affliction]AFFLICTION[/section]", "[section:clr-control]CONTROL[/section]", "([section:clr-conc]CONCENTRATION[/section])", "Radius: 8m"]
    auto_type: [DC, WIL]
    type:
      - "[section:clr-DC]DC[/section] [section:clr-attr]WIL[/section] vs [section:clr-attr]???[/section]"
    cost:
      - "[section:clr-mp]3–6 MP[/section]"
    description: >
      Afflicts any targets of the caster's choosing within the radius with a negative [url:status]status effect[/url] based on the patron deity's powers.
      [br]May or may not be cast with Concentration, depending on the effect and common sense.
      [br]Mana cost depends on the strength of the effect, again based on common sense.
    effect: >
      Applies a negative [url:status]status effect[/url].

  - name: Boon Aura II
    id: boon-aura-ii
    tags: [TIER III, Faith, Utility, "[section:clr-support]SUPPORT[/section]", "([section:clr-conc]CONCENTRATION[/section])", "Radius: 8m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]3–6 MP[/section]"
    description: >
      Grants any targets of the caster's choosing within the radius a positive [url:status]status effect[/url] based on the patron deity's powers.
      [br]May or may not be cast with Concentration, depending on the effect and common sense.
      [br]Mana cost depends on the strength of the effect, again based on common sense.
      [br][i]If the target is unwilling, cast as [section:clr-dc]DC[/section] instead (see [url:invokerS#bane-aura-ii]Bane Aura[/url]).[/i]
    effect: >
      Applies a positive [url:status]status effect[/url].

  - name: Divine Edict
    id: divine-edict
    tags: [TIER II, Faith, Utility, "[section:clr-control]CONTROL[/section]", "[section:clr-zone]ZONE[/section]", "[section:clr-conc]CONCENTRATION[/section]", "Radius: 12m"]
    auto_type: [DC, WIL]
    type:
      - "[section:clr-dc]DC[/section] [section:clr-attr]WIL[/section] vs [section:clr-attr]???[/section]"
    cost:
      - "[section:clr-mp]3 MP[/section]"
    description: >
      Explicitly forbids all nearby creatures to perform a specific action under the authority of the patron deity.
      [br]The action must be related to the patron deity's domains or elements.
    effect: >
      Creatures in the area cannot execute the action.
    saved: Action has [url:core#Disadvantage]Disadvantage 1[/url].
    saved10: No effect.

  - name: Imbuement III
    id: imbuement-iii
    tags: [TIER III, Faith, Utility, "[section:clr-support]SUPPORT[/section]", "[section:clr-conc]CONCENTRATION[/section]", "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]3 MP[/section]"
    description: >
      Imbues a target within range with divine energies, temporarily raising an [section:clr-attr]attribute MOD[/section] relating to the patron deity's powers.
    effect: >
      [section:clr-attr]Attribute MOD[/section] is increased by [section:clr-value]3[/section].

  - name: Mass Imbuement II
    id: mass-imbuement-ii
    tags: [TIER III, Faith, Utility, "[section:clr-support]SUPPORT[/section]", "[section:clr-conc]CONCENTRATION[/section]", "Range: 20m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]2 MP[/section] per target"
    description: >
      Imbues up to [[section:clr-values]Faith[/section]] targets within range with divine energies, temporarily raising an [section:clr-attr]attribute MOD[/section] relating to the patron deity's powers.
    effect: >
      [section:clr-attr]Attribute MOD[/section] is increased by [section:clr-value]2[/section].

  - name: Mass Restoration II
    id: mass-restoration-ii
    tags: [TIER III, Faith, Utility, "[section:clr-heal]HEAL[/section]", "Range: 16m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]3 MP[/section] per target"
    description: >
      Heals up to [[section:clr-value]Faith[/section]] targets within range.
      [br][i]Only works if the patron deity's powers could reasonably produce restorative effects.[/i]
    effect: >
      [section:clr-roll]3d6[/section] [section:clr-heal]Healing[/section].

  - name: Restoration III
    id: restoration-iii
    tags: [TIER III, Faith, Utility, "[section:clr-heal]HEAL[/section]", "Range: 16m"]
    type:
      - "[section:clr-surecast]SURECAST[/section]"
    cost:
      - "[section:clr-mp]4 MP[/section]"
    description: >
      Heals a target within range.
      [br][i]Only works if the patron deity's powers could reasonably produce restorative effects.[/i]
    effect: >
      [section:clr-roll]4d6[/section] [section:clr-heal]Healing[/section].


ritual:
  - name: Shape the World
    id: shape-the-world
    tags: [TIER III, Out of Combat, "Radius: [[section:clr-value]Faith[/section] × 10] m"]
    type:
      - "[section:clr-ritual]RITUAL[/section]"
    cast_time: 1 Phase
    description: >
      Calls the divine essence of the patron deity into the mortal world to shape a large area in its image.
    effect: >
      Specific effects, cost, and duration are negotiable.
