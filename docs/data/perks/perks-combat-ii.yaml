name: "Combat Perks II"
id: "perks-combat-ii"
prefix: "perksC"

content:
  - name: Armor Familiarity II
    id: armor-familiarity-ii
    sp-cost: 20
    requirements: Armor Familiarity I
    description: >
      Encumbrance of [url:armor#HeavyArmor]heavy armor[/url] is further reduced by [section:clr-value]1[/section] per piece.

  - name: Butcher
    id: butcher
    sp-cost: 20
    requirements: –
    description: >
      If you inflict [url:status#Bleeding]Bleeding[/url] on a target that is already bleeding, the target immediately takes the original Bleeding damage again. The effect remains.

  - name: Conditioned II
    id: conditioned-ii
    sp-cost: 20
    requirements: –
    description: >
      Increase maximum [url:values#EN]Energy[/url] ([section:clr-en]EN[/section]) by [section:clr-value]5[/section] and [url:values#TN]Toughness[/url] (TN) by [section:clr-value]1[/section].

  - name: David
    id: david
    sp-cost: 20
    requirements: Ranged weapon
    description: >
      When rolling damage with ranged weapons, you may reroll [section:clr-value]one[/section] die if its result is below that die’s average.

  - name: Dual Wielding
    id: dual-wielding
    sp-cost: 20
    requirements: Two one-handed melee weapons
    description: >
      Unmodified [url:def#MeleeAttack]melee attacks[/url] and [url:wskills]Weapon Skills[/url] have [url:core#Advantage]Advantage 1[/url].

  - name: Goliath
    id: goliath
    sp-cost: 20
    requirements: Melee weapon
    description: >
      When rolling damage with melee weapons, you may reroll one die if its result is below that die’s average.

  - name: Mage Slayer
    id: mage-slayer
    sp-cost: 20
    requirements: –
    description: >
      When a creature in your weapon's range casts a spell, you may execute a [url:def#BasicAttack]basic attack[/url] as a [url:def#Reaction]reaction[/url].

  - name: Powerful Blows
    id: powerful-blows
    sp-cost: 20
    requirements: Two-handed weapon
    description: >
      [url:def#Parry]Parry[/url] and [url:def#Block]block[/url] rolls against your unmodified [url:def#MeleeAttacks]melee attacks[/url] and [url:wskills]Weapon Skills[/url] have [url:core#Disadvantage]Disadvantage 1[/url].

  - name: Retaliator
    id: retaliator
    sp-cost: 20
    requirements: –
    description: >
      [url:core#Advantage]Advantage 1[/url] on [i][url:skills1#Counter]Counter[/url][/i].

  - name: Sharpshooter
    id: sharpshooter
    sp-cost: 20
    requirements: Ranged weapon
    description: >
      [url:def#RangedAttack]Ranged attacks[/url] at long range are [url:core#Eased]eased[/url] by [[section:clr-attr]PER-MOD[/section]].

  - name: Swashbuckler
    id: swashbuckler
    sp-cost: 20
    requirements: Single one-handed melee weapon
    description: >
      [url:core#Advantage]Advantage 1[/url] on [url:def#Parry]parry[/url] rolls.
